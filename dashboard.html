<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>
  <div class="dashboard">
    <div class="sidebar">
      <h2>SAFEGUARD AI</h2>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="history.html">History</a>
      <a href="education.html">Education</a>
    </div>

    <div class="main">
      <div class="dashboard-header">
        <h1>AI DISASTER ANALYSIS</h1>
      </div>

      <div class="glass-box">
        <h2>Environmental Parameters</h2>
        <div class="form-grid">
          <input type="number" id="temperature" placeholder="Suhu (0-60°C)" min="0" max="60">
          <input type="number" id="humidity" placeholder="Kelembapan (0-100%)" min="0" max="100">
          <input type="number" id="rainfall" placeholder="Curah Hujan (0-500mm)" min="0" max="500">
          <input type="number" id="water" placeholder="Tinggi Air (0-300cm)" min="0" max="300">
          <input type="number" id="vibration" placeholder="Getaran Tanah (0-100)" min="0" max="100">
          <input type="number" id="pressure" placeholder="Tekanan Udara" min="800" max="1200">
        </div>

        <div class="search-location">
          <input type="text" id="locationInput" placeholder="Cari lokasi (wajib diisi)...">
          <div id="suggestions"></div>
        </div>

        <button class="btn analyze-btn" onclick="analyzeData()">ANALISA SEKARANG</button>
      </div>

      <div class="scanner" id="scanner">
        <div class="radar"></div>
        <h2>AI SCANNING...</h2>
        <p id="scanText">Scanning environmental conditions...</p>
      </div>

      <div class="result glass-box" id="result">
        <h2>HASIL ANALISA AI</h2>
        <div id="predictionText"></div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <canvas id="riskChart"></canvas>
      </div>

      <div id="map"></div>
    </div>
  </div>

  <script src="js/prediction.js"></script>
  <script src="js/chart.js"></script>


  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const current = window.location.pathname.split("/").pop() || "index.html";
      document.querySelectorAll('.nav-links a, .sidebar a').forEach(link => {
        if (link.getAttribute('href') === current) link.classList.add('active');
      });
    });
  </script>
</body>

</html>
